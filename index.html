<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>lu品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            /* 背景透明，让底部图片透出来 — 您可以在 body 外套一个 div 设置背景图 */
            background: transparent;
            color: #1e1e1e;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2c3e4e, #4a627a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #4a5b6b;
            font-size: 1rem;
            border-top: 1px solid #ddd6cf;
            display: inline-block;
            padding-top: 0.6rem;
        }

        /* ========= 标签筛选栏 - 使用您的 PNG 背景 ========= */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            padding-bottom: 0.5rem;
        }

        .tag-btn {
            /* 您的 PNG 按钮背景图 */
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 0px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e4e;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-family: inherit;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
        }

        .tag-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
        }

        .tag-btn.active {
            /* 激活状态用另一张图 */
            background-image: url('images/btn-bg-active.png');
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        /* ========= 作品网格 (动态大小) ========= */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.8rem;
            margin-bottom: 3rem;
        }

        /* 绘画卡片 - 直角透明背景 */
        .art-card {
            background: rgba(255, 255, 245, 0.25);
            backdrop-filter: blur(3px);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border-radius: 0px;
        }

        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 32px -8px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 245, 0.95);
        }

        /* 图片容器 */
        .image-wrapper {
            position: relative;
            background: rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
            object-fit: cover;
        }

        .art-card:hover .art-image {
            transform: scale(1.02);
        }

        /* ========= 作品信息区 - 使用您的 PNG 背景 ========= */
        .art-info {
            padding: 1.2rem 1rem 1.3rem;
            /* 您的卡片信息区背景 PNG */
            background-image: url('images/card-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(200,180,150,0.4);
        }
        /* 半透层保证文字可读性（可调整透明度） */
        .art-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 250, 240, 0.7);
            z-index: -1;
        }

        .art-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #1f2e3a;
        }

        .art-meta {
            font-size: 0.8rem;
            color: #5e6e7e;
            margin-bottom: 0.6rem;
            letter-spacing: 0.3px;
        }

        /* 作品标签小标 */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.5rem;
        }

        .painting-tag {
            background: rgba(60, 70, 85, 0.7);
            backdrop-filter: blur(2px);
            padding: 0.2rem 0.7rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #f5f5f0;
            border-radius: 0px;
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
            color: #8d9aa5;
            background: rgba(245, 242, 237, 0.8);
            border-radius: 0px;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem 0 0.5rem;
            border-top: 1px solid #ddd6cf;
            color: #7c8b9a;
            font-size: 0.85rem;
        }

        /* 模态框 (点击图片放大) - 直角风格 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 0px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,240,0.5);
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px;
        }

        .close-modal:hover {
            color: #ccc;
            background: rgba(0,0,0,0.9);
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .gallery {
                gap: 1.2rem;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
            .header h1 {
                font-size: 2rem;
            }
            .tag-btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎨 绘迹 · 原创与二创</h1>
        <div class="sub">指尖触碰，放大每寸笔触 | 个人绘画作品集</div>
    </div>

    <!-- 动态标签栏 -->
    <div class="tag-filter" id="tagFilterBar"></div>

    <!-- 作品网格 -->
    <div class="gallery" id="galleryContainer">
        <div class="loading-placeholder" style="grid-column:1/-1; text-align:center; padding:2rem;">✨ 加载作品中... ✨</div>
    </div>

    <div class="footer">
        <p>© 个人绘画作品 · 所有图像版权归原作者 | 背景透明直角画廊</p>
    </div>
</div>

<!-- 模态框 -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage" alt="绘画放大预览">
</div>

<script>
    // --------------------------------------------------------------
    // 绘画作品数据 — 请替换为您的真实作品图片路径
    // --------------------------------------------------------------
    const paintingsData = [
        {
            id: 1,
            title: "zmd",
            year: "2025.4.21",
            medium: "无",
            category: "二创", "角色"
            tags: ["二创", "角色"],
            imageUrl: "images/0001.jpg",
            alt: "   1234567"
        }
    ];

    // 全局变量
    let currentPaintings = [...paintingsData];
    let activeFilter = "全部";

    const galleryContainer = document.getElementById('galleryContainer');
    const tagFilterBar = document.getElementById('tagFilterBar');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModalSpan = document.querySelector('.close-modal');

    // 提取所有筛选标签
    function getAllFilterTags() {
        const tagSet = new Set();
        tagSet.add("全部");
        tagSet.add("原创");
        tagSet.add("二创");
        paintingsData.forEach(painting => {
            if (painting.tags && Array.isArray(painting.tags)) {
                painting.tags.forEach(tag => tagSet.add(tag));
            }
        });
        return Array.from(tagSet);
    }

    // 筛选作品
    function filterPaintingsByTag(tag) {
        if (tag === "全部") {
            return [...paintingsData];
        } else if (tag === "原创" || tag === "二创") {
            return paintingsData.filter(p => p.category === tag);
        } else {
            return paintingsData.filter(p => p.tags && p.tags.includes(tag));
        }
    }

    // 渲染标签按钮
    function renderTagButtons() {
        const allTags = getAllFilterTags();
        tagFilterBar.innerHTML = '';
        allTags.forEach(tag => {
            const btn = document.createElement('button');
            btn.textContent = tag;
            btn.classList.add('tag-btn');
            if (tag === activeFilter) {
                btn.classList.add('active');
            }
            btn.addEventListener('click', () => {
                activeFilter = tag;
                currentPaintings = filterPaintingsByTag(activeFilter);
                renderGallery(currentPaintings);
                document.querySelectorAll('.tag-btn').forEach(btnEl => {
                    if (btnEl.textContent === activeFilter) {
                        btnEl.classList.add('active');
                    } else {
                        btnEl.classList.remove('active');
                    }
                });
            });
            tagFilterBar.appendChild(btn);
        });
    }

    // 渲染作品网格
    function renderGallery(paintingsArray) {
        if (!galleryContainer) return;
        galleryContainer.innerHTML = '';

        if (!paintingsArray.length) {
            const noResultDiv = document.createElement('div');
            noResultDiv.className = 'no-results';
            noResultDiv.textContent = '🖼️ 暂无此类作品，试试其他标签 🖼️';
            galleryContainer.appendChild(noResultDiv);
            return;
        }

        paintingsArray.forEach(painting => {
            const card = document.createElement('div');
            card.className = 'art-card';

            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';

            const img = document.createElement('img');
            img.src = painting.imageUrl;
            img.alt = painting.alt || painting.title;
            img.className = 'art-image';
            img.loading = 'lazy';

            img.addEventListener('click', (e) => {
                e.stopPropagation();
                modal.style.display = 'flex';
                modalImg.src = painting.imageUrl;
                modalImg.alt = painting.title;
            });

            imgWrapper.appendChild(img);

            const infoDiv = document.createElement('div');
            infoDiv.className = 'art-info';

            const titleEl = document.createElement('div');
            titleEl.className = 'art-title';
            titleEl.textContent = painting.title;

            const metaEl = document.createElement('div');
            metaEl.className = 'art-meta';
            metaEl.textContent = `${painting.year} · ${painting.medium} · ${painting.category}`;

            const tagContainer = document.createElement('div');
            tagContainer.className = 'tag-list';
            if (painting.tags && painting.tags.length) {
                painting.tags.forEach(tag => {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'painting-tag';
                    tagSpan.textContent = tag;
                    tagSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const targetBtn = Array.from(document.querySelectorAll('.tag-btn')).find(btn => btn.textContent === tag);
                        if (targetBtn) {
                            targetBtn.click();
                        } else {
                            activeFilter = tag;
                            currentPaintings = filterPaintingsByTag(activeFilter);
                            renderGallery(currentPaintings);
                            document.querySelectorAll('.tag-btn').forEach(btn => {
                                if (btn.textContent === activeFilter) btn.classList.add('active');
                                else btn.classList.remove('active');
                            });
                        }
                    });
                    tagContainer.appendChild(tagSpan);
                });
            }

            infoDiv.appendChild(titleEl);
            infoDiv.appendChild(metaEl);
            infoDiv.appendChild(tagContainer);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            galleryContainer.appendChild(card);
        });
    }

    // 模态框关闭
    function initModal() {
        closeModalSpan.onclick = function() {
            modal.style.display = "none";
        };
        modal.onclick = function(e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape" && modal.style.display === "flex") {
                modal.style.display = "none";
            }
        });
    }

    function init() {
        activeFilter = "全部";
        currentPaintings = filterPaintingsByTag(activeFilter);
        renderTagButtons();
        renderGallery(currentPaintings);
        initModal();
    }

    init();
</script>

<!-- 使用说明：
     1. 准备以下 PNG 图片放入 images/ 文件夹：
        - btn-bg.png        (普通按钮背景)
        - btn-bg-active.png (选中按钮背景)
        - card-bg.png       (作品信息区背景)
     
     2. 整体背景：body 背景已透明，请在 <body> 外层或直接给 body 设置背景图：
        例如在 CSS 中添加 body { background-image: url('images/your-bg.jpg'); }
     
     3. 作品图片：放入 images/ 文件夹，并修改 paintingsData 中的 imageUrl
     
     4. 所有圆角已改为直角 (border-radius: 0)
-->
</body>
</html>
