<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>二次元作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: transparent;
            color: #1e1e1e;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2c3e4e, #4a627a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #4a5b6b;
            font-size: 1rem;
            border-top: 1px solid #ddd6cf;
            display: inline-block;
            padding-top: 0.6rem;
        }

        /* 标签筛选栏 - PNG背景 */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            padding-bottom: 0.5rem;
        }

        .tag-btn {
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 0px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e4e;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-family: inherit;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
        }

        .tag-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
        }

        .tag-btn.active {
            background-image: url('images/btn-bg-active.png');
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        /* 作品网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.8rem;
            margin-bottom: 3rem;
        }

        /* 卡片样式 */
        .art-card {
            background: rgba(255, 255, 245, 0.25);
            backdrop-filter: blur(3px);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            border-radius: 0px;
        }

        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 32px -8px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 245, 0.95);
        }

        .image-wrapper {
            position: relative;
            background: rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
            object-fit: cover;
        }

        .art-card:hover .art-image {
            transform: scale(1.02);
        }

        /* 作品信息区 - PNG背景 */
        .art-info {
            padding: 1.2rem 1rem 1.3rem;
            background-image: url('images/card-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(200,180,150,0.4);
        }

        .art-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 250, 240, 0.7);
            z-index: -1;
        }

        /* 只保留三个信息：时间、标签、介绍 */
        .art-year {
            font-size: 0.85rem;
            color: #5e6e7e;
            margin-bottom: 0.4rem;
            letter-spacing: 0.3px;
        }

        .art-label {
            display: inline-block;
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 0.2rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2c3e4e;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
            margin-bottom: 0.6rem;
            border-radius: 0px;
        }

        .art-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1f2e3a;
            line-height: 1.4;
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
            color: #8d9aa5;
            background: rgba(245, 242, 237, 0.8);
            border-radius: 0px;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem 0 0.5rem;
            border-top: 1px solid #ddd6cf;
            color: #7c8b9a;
            font-size: 0.85rem;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 0px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,240,0.5);
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px;
        }

        .close-modal:hover {
            color: #ccc;
            background: rgba(0,0,0,0.9);
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .gallery {
                gap: 1.2rem;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
            .header h1 {
                font-size: 2rem;
            }
            .tag-btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎨 二次元作品集</h1>
        <div class="sub">时间 · 标签 · 介绍</div>
    </div>

    <div class="tag-filter" id="tagFilterBar"></div>
    <div class="gallery" id="galleryContainer">
        <div class="loading-placeholder" style="grid-column:1/-1; text-align:center; padding:2rem;">✨ 加载作品中... ✨</div>
    </div>
    <div class="footer">
        <p>© 个人作品集 · 图片托管于 GitHub</p>
    </div>
</div>

<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage" alt="放大预览">
</div>

<script>
    // ===================== 作品数据（简化版）=====================
    // 每个作品只有三个核心信息：year(时间), label(标签名称), title(介绍)
    // 您可以根据需要增加更多作品
    const paintingsData = [
        {
            id: 1,
            title: "zmd",              // 介绍
            year: "2025.4.21",         // 时间
            label: "二创",             // 标签名称（用于筛选和显示）
            imageUrl: "images/0001.jpg",
            alt: "zmd"
        },
        // 添加更多作品示例：
        // {
        //     id: 2,
        //     title: "夏日回忆",
        //     year: "2025.3.15",
        //     label: "原创",
        //     imageUrl: "images/0002.jpg",
        //     alt: "夏日回忆"
        // },
        // {
        //     id: 3,
        //     title: "幻想角色",
        //     year: "2025.2.10",
        //     label: "角色",
        //     imageUrl: "images/0003.jpg",
        //     alt: "幻想角色"
        // }
    ];

    // 全局变量
    let currentPaintings = [...paintingsData];
    let activeFilter = "全部";

    const galleryContainer = document.getElementById('galleryContainer');
    const tagFilterBar = document.getElementById('tagFilterBar');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModalSpan = document.querySelector('.close-modal');

    // 提取所有不重复的标签（用于筛选栏）
    function getAllLabels() {
        const labelSet = new Set();
        labelSet.add("全部");
        paintingsData.forEach(painting => {
            if (painting.label) {
                labelSet.add(painting.label);
            }
        });
        return Array.from(labelSet);
    }

    // 根据标签筛选作品
    function filterPaintingsByLabel(label) {
        if (label === "全部") {
            return [...paintingsData];
        } else {
            return paintingsData.filter(p => p.label === label);
        }
    }

    // 渲染筛选按钮
    function renderTagButtons() {
        const allLabels = getAllLabels();
        tagFilterBar.innerHTML = '';
        allLabels.forEach(label => {
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.classList.add('tag-btn');
            if (label === activeFilter) {
                btn.classList.add('active');
            }
            btn.addEventListener('click', () => {
                activeFilter = label;
                currentPaintings = filterPaintingsByLabel(activeFilter);
                renderGallery(currentPaintings);
                document.querySelectorAll('.tag-btn').forEach(btnEl => {
                    if (btnEl.textContent === activeFilter) {
                        btnEl.classList.add('active');
                    } else {
                        btnEl.classList.remove('active');
                    }
                });
            });
            tagFilterBar.appendChild(btn);
        });
    }

    // 渲染作品网格
    function renderGallery(paintingsArray) {
        if (!galleryContainer) return;
        galleryContainer.innerHTML = '';

        if (!paintingsArray.length) {
            const noResultDiv = document.createElement('div');
            noResultDiv.className = 'no-results';
            noResultDiv.textContent = '🖼️ 暂无作品，试试其他标签 🖼️';
            galleryContainer.appendChild(noResultDiv);
            return;
        }

        paintingsArray.forEach(painting => {
            const card = document.createElement('div');
            card.className = 'art-card';

            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';

            const img = document.createElement('img');
            img.src = painting.imageUrl;
            img.alt = painting.alt || painting.title;
            img.className = 'art-image';
            img.loading = 'lazy';

            img.addEventListener('click', (e) => {
                e.stopPropagation();
                modal.style.display = 'flex';
                modalImg.src = painting.imageUrl;
                modalImg.alt = painting.title;
            });

            imgWrapper.appendChild(img);

            const infoDiv = document.createElement('div');
            infoDiv.className = 'art-info';

            // 时间
            const yearEl = document.createElement('div');
            yearEl.className = 'art-year';
            yearEl.textContent = painting.year;

            // 标签名称（使用与按钮相同的PNG背景）
            const labelEl = document.createElement('div');
            labelEl.className = 'art-label';
            labelEl.textContent = painting.label;

            // 介绍
            const titleEl = document.createElement('div');
            titleEl.className = 'art-title';
            titleEl.textContent = painting.title;

            infoDiv.appendChild(yearEl);
            infoDiv.appendChild(labelEl);
            infoDiv.appendChild(titleEl);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            galleryContainer.appendChild(card);
        });
    }

    // 模态框关闭
    function initModal() {
        closeModalSpan.onclick = () => modal.style.display = "none";
        modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.style.display === "flex") modal.style.display = "none";
        });
    }

    function init() {
        activeFilter = "全部";
        currentPaintings = filterPaintingsByLabel(activeFilter);
        renderTagButtons();
        renderGallery(currentPaintings);
        initModal();
    }

    init();
</script>

<!-- 使用说明：
     1. 准备图片：将 btn-bg.png、btn-bg-active.png、card-bg.png 放入 images/ 文件夹
     2. 作品图片：放入 images/ 文件夹，修改 paintingsData 中的 imageUrl
     3. 每个作品只需填写：title（介绍）、year（时间）、label（标签名称）
     4. 筛选栏自动从所有 label 中生成，点击可筛选
-->
</body>
</html>
