<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>绘画个人作品集 | 原创·二创画廊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f5f2ed;  /* 后备背景色，可自行替换为图片 */
            color: #1e1e1e;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            /* 可选：整体背景图 (用户可替换) */
            /* background-image: url('images/body-bg.jpg'); */
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2c3e4e, #4a627a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #4a5b6b;
            font-size: 1rem;
            border-top: 1px solid #ddd6cf;
            display: inline-block;
            padding-top: 0.6rem;
        }

        /* ========= 标签筛选栏 ========= */
        /* 分类按钮使用 PNG 背景 (用户需准备图片) */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            padding-bottom: 0.5rem;
        }

        .tag-btn {
            /* 自定义按钮背景 PNG —— 请将您的按钮背景图放入 images/btn-bg.png */
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;   /* 透明底色，让背景图完全显示 */
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;             /* 圆角可自行调整，背景图需适配 */
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e4e;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-family: inherit;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tag-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
            /* 可选：悬停时用另一张图，可取消注释 */
            /* background-image: url('images/btn-bg-hover.png'); */
        }

        .tag-btn.active {
            /* 激活状态的按钮背景图 (高亮) */
            background-image: url('images/btn-bg-active.png');
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            filter: brightness(1.02);
            transform: scale(1.02);
        }

        /* 后备样式：如果图片加载失败，显示柔和底色 */
        .tag-btn {
            background-color: #e9e4de;
            background-blend-mode: overlay;
        }

        /* ========= 作品网格 (动态大小) ========= */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.8rem;
            margin-bottom: 3rem;
        }

        /* 绘画卡片 */
        .art-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 32px -10px rgba(0, 0, 0, 0.2);
        }

        /* 图片容器 — 自适应高度 */
        .image-wrapper {
            position: relative;
            background: #f0ede8;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
            object-fit: cover;
        }

        .art-card:hover .art-image {
            transform: scale(1.02);
        }

        /* ========= 作品信息区 (背景使用用户 PNG) ========= */
        .art-info {
            padding: 1.2rem 1rem 1.3rem;
            /* 自定义卡片信息区背景 PNG */
            background-image: url('images/card-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(255,255,240,0.4);
        }
        /* 增加半透层保证文字可读性 (根据您的背景图可调整透明度) */
        .art-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 250, 240, 0.75); /* 半透暖白，让文字清晰 */
            z-index: -1;
            border-radius: 0 0 20px 20px;
        }

        .art-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #1f2e3a;
        }

        .art-meta {
            font-size: 0.8rem;
            color: #5e6e7e;
            margin-bottom: 0.6rem;
            letter-spacing: 0.3px;
        }

        /* 作品标签小圆标 (风格标签) */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.5rem;
        }

        .painting-tag {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c4c6c;
            background-color: rgba(255,255,240,0.8);
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
            color: #8d9aa5;
            background: rgba(245, 242, 237, 0.8);
            border-radius: 40px;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem 0 0.5rem;
            border-top: 1px solid #ddd6cf;
            color: #7c8b9a;
            font-size: 0.85rem;
        }

        /* 模态框 (点击图片放大) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-modal:hover {
            color: #ccc;
            background: rgba(0,0,0,0.8);
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .gallery {
                gap: 1.2rem;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
            .header h1 {
                font-size: 2rem;
            }
            .tag-btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎨 绘迹 · 原创与二创</h1>
        <div class="sub">指尖触碰，放大每寸笔触 | 个人绘画作品集</div>
    </div>

    <!-- 动态标签栏 -->
    <div class="tag-filter" id="tagFilterBar"></div>

    <!-- 作品网格 -->
    <div class="gallery" id="galleryContainer">
        <div class="loading-placeholder" style="grid-column:1/-1; text-align:center; padding:2rem;">✨ 加载作品中... ✨</div>
    </div>

    <div class="footer">
        <p>© 个人绘画作品 · 所有图像版权归原作者 | 背景装饰素材自主设计</p>
    </div>
</div>

<!-- 模态框 -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage" alt="绘画放大预览">
</div>

<script>
    // --------------------------------------------------------------
    // 绘画作品数据 (请替换为您的真实作品)
    // 每个作品可以包含：
    // - category: "原创" 或 "二创" (核心分类)
    // - tags: 其他风格标签 (如水彩、油画、风景等)
    // 标签筛选栏会自动生成 "全部"、"原创"、"二创" 以及所有 tags 中的独特标签
    // --------------------------------------------------------------
    const paintingsData = [
        {
            id: 1,
            title: "暮色山谷",
            year: "2024",
            medium: "布面油画 | 50×60cm",
            category: "原创",
            tags: ["风景", "油画", "自然"],
            // 请将您的绘画图片放在 images/ 文件夹内，或使用图床直链
            imageUrl: "images/painting1.jpg",
            alt: "暮色中的山谷"
        },
        {
            id: 2,
            title: "旧巷晨光",
            year: "2023",
            medium: "水彩 | 38×56cm",
            category: "原创",
            tags: ["街景", "水彩", "城市"],
            imageUrl: "images/painting2.jpg",
            alt: "老街水彩"
        },
        {
            id: 3,
            title: "静物·石榴与陶罐",
            year: "2024",
            medium: "布面油画 | 40×50cm",
            category: "原创",
            tags: ["静物", "油画", "传统"],
            imageUrl: "images/painting3.jpg",
            alt: "静物油画"
        },
        {
            id: 4,
            title: "林中鹿影 (二创·吉卜力风)",
            year: "2022",
            medium: "丙烯 | 60×80cm",
            category: "二创",
            tags: ["动物", "丙烯", "梦幻", "致敬"],
            imageUrl: "images/painting4.jpg",
            alt: "森林与鹿"
        },
        {
            id: 5,
            title: "海边的屋子",
            year: "2023",
            medium: "水彩 | 31×41cm",
            category: "原创",
            tags: ["风景", "水彩", "海岸"],
            imageUrl: "images/painting5.jpg",
            alt: "海边建筑"
        },
        {
            id: 6,
            title: "肖像·沉思 (二创·古典造型)",
            year: "2024",
            medium: "素描 | 炭笔 38×54cm",
            category: "二创",
            tags: ["人物", "素描", "黑白"],
            imageUrl: "images/painting6.jpg",
            alt: "素描人物"
        },
        {
            id: 7,
            title: "春日花园",
            year: "2024",
            medium: "油画棒 | 42×56cm",
            category: "原创",
            tags: ["花卉", "油画棒", "印象"],
            imageUrl: "images/painting7.jpg",
            alt: "花园印象"
        },
        {
            id: 8,
            title: "江南雨巷 (二创·水墨意境)",
            year: "2023",
            medium: "水墨 | 35×70cm",
            category: "二创",
            tags: ["水墨", "风景", "传统"],
            imageUrl: "images/painting8.jpg",
            alt: "水墨江南"
        }
    ];

    // ---------- 注意 ----------
    // 上面的图片示例路径为 images/painting1.jpg 等，
    // 请将您的真实图片放入仓库的 images/ 目录下，并修改对应的 imageUrl。
    // 也可以使用网络直链，例如 "https://your-cdn.com/work.jpg"
    // 图片宽高无限制，画廊会自动适应卡片大小。
    // 按钮背景和卡片背景 PNG 请务必放入 images/ 并命名：
    //   - images/btn-bg.png       (普通按钮背景)
    //   - images/btn-bg-active.png (激活按钮背景)
    //   - images/card-bg.png      (作品信息区背景)
    // 若暂时没有，可先注释 background-image 行，使用纯色后备。
    // -------------------------

    // 全局变量
    let currentPaintings = [...paintingsData];
    let activeFilter = "全部";   // 当前选中的筛选条件

    // DOM 元素
    const galleryContainer = document.getElementById('galleryContainer');
    const tagFilterBar = document.getElementById('tagFilterBar');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModalSpan = document.querySelector('.close-modal');

    // ---- 提取所有可用筛选标签 (包括 "全部", "原创", "二创", 以及所有 tags 中的独特标签) ----
    function getAllFilterTags() {
        const tagSet = new Set();
        tagSet.add("全部");
        tagSet.add("原创");
        tagSet.add("二创");
        paintingsData.forEach(painting => {
            if (painting.tags && Array.isArray(painting.tags)) {
                painting.tags.forEach(tag => tagSet.add(tag));
            }
        });
        return Array.from(tagSet);
    }

    // ---- 根据当前选中标签筛选作品 (category 与 tags 均匹配) ----
    function filterPaintingsByTag(tag) {
        if (tag === "全部") {
            return [...paintingsData];
        } else if (tag === "原创" || tag === "二创") {
            // 根据 category 字段筛选
            return paintingsData.filter(p => p.category === tag);
        } else {
            // 普通风格标签，匹配 tags 数组
            return paintingsData.filter(p => p.tags && p.tags.includes(tag));
        }
    }

    // ---- 渲染标签按钮 (每个按钮背景均为自定义 PNG) ----
    function renderTagButtons() {
        const allTags = getAllFilterTags();
        tagFilterBar.innerHTML = '';
        allTags.forEach(tag => {
            const btn = document.createElement('button');
            btn.textContent = tag;
            btn.classList.add('tag-btn');
            if (tag === activeFilter) {
                btn.classList.add('active');
            }
            btn.addEventListener('click', () => {
                activeFilter = tag;
                currentPaintings = filterPaintingsByTag(activeFilter);
                renderGallery(currentPaintings);
                // 更新按钮激活样式
                document.querySelectorAll('.tag-btn').forEach(btnEl => {
                    if (btnEl.textContent === activeFilter) {
                        btnEl.classList.add('active');
                    } else {
                        btnEl.classList.remove('active');
                    }
                });
            });
            tagFilterBar.appendChild(btn);
        });
    }

    // ---- 渲染作品网格 (每个卡片信息区背景均为 card-bg.png) ----
    function renderGallery(paintingsArray) {
        if (!galleryContainer) return;
        galleryContainer.innerHTML = '';

        if (!paintingsArray.length) {
            const noResultDiv = document.createElement('div');
            noResultDiv.className = 'no-results';
            noResultDiv.textContent = '🖼️ 暂无此类作品，试试其他标签吧 🖼️';
            galleryContainer.appendChild(noResultDiv);
            return;
        }

        paintingsArray.forEach(painting => {
            const card = document.createElement('div');
            card.className = 'art-card';

            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';

            const img = document.createElement('img');
            img.src = painting.imageUrl;
            img.alt = painting.alt || painting.title;
            img.className = 'art-image';
            img.loading = 'lazy';

            // 点击图片放大
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                modal.style.display = 'flex';
                modalImg.src = painting.imageUrl;
                modalImg.alt = painting.title;
            });

            imgWrapper.appendChild(img);

            // 信息区域 (背景自动使用 card-bg.png)
            const infoDiv = document.createElement('div');
            infoDiv.className = 'art-info';

            const titleEl = document.createElement('div');
            titleEl.className = 'art-title';
            titleEl.textContent = painting.title;

            const metaEl = document.createElement('div');
            metaEl.className = 'art-meta';
            // 显示年份 + 材质 + 类别 (原创/二创)
            metaEl.textContent = `${painting.year} · ${painting.medium} · ${painting.category}`;

            const tagContainer = document.createElement('div');
            tagContainer.className = 'tag-list';
            if (painting.tags && painting.tags.length) {
                painting.tags.forEach(tag => {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'painting-tag';
                    tagSpan.textContent = tag;
                    // 点击小标签快速筛选 (增强体验)
                    tagSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        // 寻找对应标签按钮并触发点击
                        const targetBtn = Array.from(document.querySelectorAll('.tag-btn')).find(btn => btn.textContent === tag);
                        if (targetBtn) {
                            targetBtn.click();
                        } else {
                            // 若标签未在主栏 (不太可能) 则手动更新
                            activeFilter = tag;
                            currentPaintings = filterPaintingsByTag(activeFilter);
                            renderGallery(currentPaintings);
                            document.querySelectorAll('.tag-btn').forEach(btn => {
                                if (btn.textContent === activeFilter) btn.classList.add('active');
                                else btn.classList.remove('active');
                            });
                        }
                    });
                    tagContainer.appendChild(tagSpan);
                });
            }

            infoDiv.appendChild(titleEl);
            infoDiv.appendChild(metaEl);
            infoDiv.appendChild(tagContainer);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            galleryContainer.appendChild(card);
        });
    }

    // ---- 模态框关闭逻辑 ----
    function initModal() {
        closeModalSpan.onclick = function() {
            modal.style.display = "none";
        };
        modal.onclick = function(e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape" && modal.style.display === "flex") {
                modal.style.display = "none";
            }
        });
    }

    // ---- 初始化页面 ----
    function init() {
        activeFilter = "全部";
        currentPaintings = filterPaintingsByTag(activeFilter);
        renderTagButtons();
        renderGallery(currentPaintings);
        initModal();
    }

    init();
</script>

<!-- 使用说明：
     1. 图片准备：将您的绘画作品图片放入 images/ 文件夹 (如 painting1.jpg 等)，并修改 paintingsData 中对应的 imageUrl。
     2. 按钮背景图：请准备三张 PNG 图片放入 images/：
        - btn-bg.png       (普通按钮背景)
        - btn-bg-active.png (选中状态的按钮背景)
        - card-bg.png      (作品信息卡片背景，建议浅色纹理)
        如果暂时没有这些图片，可以临时在 CSS 中注释 background-image 行，按钮和卡片会显示半透明白色后备。
     3. 分类规则：每个作品有 category: "原创" 或 "二创"，以及 tags 数组。筛选栏会自动生成“全部”“原创”“二创”以及所有 tags 标签。
     4. 动态适配：画廊采用 grid 布局，图片宽度自适应，卡片高度随图片比例变化。
     5. 部署：将所有文件上传到 GitHub 仓库，开启 Pages 服务即可访问。
-->
</body>
</html>
