<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>绘画个人作品集 | 原创·二创画廊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f5f2ed;  /* 后备背景色，可自行替换为图片 */
            color: #1e1e1e;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            /* 可选：整体背景图 (用户可替换) */
            /* background-image: url('images/body-bg.jpg'); */
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2c3e4e, #4a627a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #4a5b6b;
            font-size: 1rem;
            border-top: 1px solid #ddd6cf;
            display: inline-block;
            padding-top: 0.6rem;
        }

        /* ========= 标签筛选栏 ========= */
        /* 分类按钮使用 PNG 背景 (用户需准备图片) */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            padding-bottom: 0.5rem;
        }

        .tag-btn {
            /* 自定义按钮背景 PNG —— 请将您的按钮背景图放入 images/btn-bg.png */
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;   /* 透明底色，让背景图完全显示 */
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 0px;             /* 圆角可自行调整，背景图需适配 */
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e4e;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-family: inherit;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tag-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
            /* 可选：悬停时用另一张图，可取消注释 */
            /* background-image: url('images/btn-bg-hover.png'); */
        }

        .tag-btn.active {
            /* 激活状态的按钮背景图 (高亮) */
            background-image: url('images/btn-bg-active.png');
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
            filter: brightness(1.02);
            transform: scale(1.02);
        }

        /* 后备样式：如果图片加载失败，显示柔和底色 */
        .tag-btn {
            background-color: #e9e4de;
            background-blend-mode: overlay;
        }

        /* ========= 作品网格 (动态大小) ========= */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem 1.8rem;
            margin-bottom: 3rem;
        }

        /* 绘画卡片 */
        .art-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 32px -10px rgba(0, 0, 0, 0.2);
        }

        /* 图片容器 — 自适应高度 */
        .image-wrapper {
            position: relative;
            background: #f0ede8;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
            object-fit: cover;
        }

        .art-card:hover .art-image {
            transform: scale(1.02);
        }

        /* ========= 作品信息区 (背景使用用户 PNG) ========= */
        .art-info {
            padding: 1.2rem 1rem 1.3rem;
            /* 自定义卡片信息区背景 PNG */
            background-image: url('images/card-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(255,255,240,0.4);
        }
        /* 增加半透层保证文字可读性 (根据您的背景图可调整透明度) */
        .art-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 250, 240, 0.75); /* 半透暖白，让文字清晰 */
            z-index: -1;
            border-radius: 0 0 20px 20px;
        }

        .art-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #1f2e3a;
        }

        .art-meta {
            font-size: 0.8rem;
            color: #5e6e7e;
            margin-bottom: 0.6rem;
            letter-spacing: 0.3px;
        }

        /* 作品标签小圆标 (风格标签) */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.5rem;
        }

        .painting-tag {
            background: rgba(0,0,0,0.05);
            backdrop-filter: blur(2px);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c4c6c;
            background-color: rgba(255,255,240,0.8);
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
            color: #8d9aa5;
            background: rgba(245, 242, 237, 0.8);
            border-radius: 40px;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem 0 0.5rem;
            border-top: 1px solid #ddd6cf;
            color: #7c8b9a;
            font-size: 0.85rem;
        }

        /* 模态框 (点击图片放大) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-modal:hover {
            color: #ccc;
            background: rgba(0,0,0,0.8);
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .gallery {
                gap: 1.2rem;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
            .header h1 {
                font-size: 2rem;
            }
            .tag-btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎨 绘迹 · 原创与二创</h1>
        <div class="sub">指尖触碰，放大每寸笔触 | 个人绘画作品集</div>
    </div>

    <!-- 动态标签栏 -->
    <div class="tag-filter" id="tagFilterBar"></div>

    <!-- 作品网格 -->
    <div class="gallery" id="galleryContainer">
        <div class="loading-placeholder" style="grid-column:1/-1; text-align:center; padding:2rem;">✨ 加载作品中... ✨</div>
    </div>

    <div class="footer">
        <p>© 个人绘画作品 · 所有图像版权归原作者 | 背景装饰素材自主设计</p>
    </div>
</div>

<div id="imageModal" class="modal">
