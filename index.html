
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>lu作品集 · 瀑布流</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: transparent;
            color: #1e1e1e;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2c3e4e, #4a627a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        /* 工具栏：排序 + 标签筛选栏合并区域 */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 0.8rem;
        }

        .sort-bar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255,255,245,0.4);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
        }

        .sort-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #2c3e4e;
        }

        /* 排序按钮复用标签背景 PNG */
        .sort-btn {
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            padding: 0.3rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2c3e4e;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-family: inherit;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
        }

        .sort-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
        }

        .sort-btn.active {
            background-image: url('images/btn-bg-active.png');
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        /* 标签筛选栏 - PNG背景 */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            flex: 2;
        }

        .tag-btn {
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            padding: 0.5rem 1.3rem;
            border-radius: 0px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c3e4e;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-family: inherit;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
        }

        .tag-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
        }

        .tag-btn.active {
            background-image: url('images/btn-bg-active.png');
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        /* ========= 瀑布流容器 ========= */
        .gallery {
            column-count: 4;
            column-gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .art-card {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 245, 0.25);
            backdrop-filter: blur(3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: inline-block;
            width: 100%;
            border-radius: 0px;
            overflow: hidden;
        }

        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 32px -8px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 245, 0.95);
        }

        .image-wrapper {
            position: relative;
            background: rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
            object-fit: cover;
        }

        .art-card:hover .art-image {
            transform: scale(1.02);
        }

        /* 作品信息区 - PNG背景 */
        .art-info {
            padding: 0.9rem 1rem 1rem;
            background-image: url('images/card-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(200,180,150,0.4);
        }

        .art-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 250, 240, 0.7);
            z-index: -1;
        }

        .art-year {
            font-size: 0.75rem;
            color: #5e6e7e;
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
        }

        /* 多标签容器 */
        .multi-tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.5rem;
        }

        .art-label {
            display: inline-block;
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 0.2rem 0.7rem;
            font-size: 0.65rem;
            font-weight: 600;
            color: #2c3e4e;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
            border-radius: 0px;
        }

        .art-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2e3a;
            line-height: 1.4;
        }

        /* 模态框 - 展示图片 + 完整作品介绍（增加颜色背景） */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-container {
            background: rgba(30,30,35,0.9);
            backdrop-filter: blur(12px);
            max-width: 90%;
            max-height: 90%;
            width: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,200,0.3);
            overflow: auto;
            cursor: default;
        }

        .modal-content {
            max-width: 100%;
            max-height: 65vh;
            object-fit: contain;
            display: block;
        }

        /* 信息区域增加颜色背景 + 原卡片背景图叠加 */
        .modal-info {
            width: 100%;
            padding: 1rem 1.5rem;
            background-image: url('images/card-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            color: #1e1e1e;
            border-top: 1px solid rgba(255,255,200,0.3);
        }

        /* 增加半透颜色层，使背景更有色彩感同时保证文字清晰 */
        .modal-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(210, 180, 140, 0.85);  /* 暖褐色颜色背景，可自行更换色调 */
            z-index: -1;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: #2c1e12;
            text-shadow: 0 1px 1px rgba(255,255,200,0.5);
        }

        .modal-year {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 0.5rem;
            color: #3a2a1a;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .modal-tag {
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c3e4e;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }

        .modal-desc {
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
            color: #2c2418;
            font-weight: 500;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px;
            z-index: 1001;
        }

        .close-modal:hover {
            background: rgba(0,0,0,0.9);
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
            color: #8d9aa5;
            background: rgba(245, 242, 237, 0.8);
        }

        .footer {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem 0 0.5rem;
            border-top: 1px solid #ddd6cf;
            color: #7c8b9a;
            font-size: 0.8rem;
        }

        @media (max-width: 1200px) {
            .gallery { column-count: 3; }
        }
        @media (max-width: 800px) {
            .gallery { column-count: 2; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .sort-bar { justify-content: center; }
        }
        @media (max-width: 500px) {
            .gallery { column-count: 1; }
            body { padding: 1rem; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>lu作品集</h1>
    </div>

    <div class="toolbar">
        <div class="sort-bar">
            <span class="sort-label">排序</span>
            <button class="sort-btn" data-sort="desc">倒序</button>
            <button class="sort-btn" data-sort="asc">正序</button>
        </div>
        <div class="tag-filter" id="tagFilterBar"></div>
    </div>
    
    <div class="gallery" id="galleryContainer">
        <div class="loading-placeholder" style="text-align:center; padding:2rem;">✨ 加载作品中... ✨</div>
    </div>
    
    <div class="footer">
        <p>© 个人作品集 · 多标签筛选 | 瀑布流错落 | 点击图片查看详情</p>
    </div>
</div>

<!-- 模态框：图片+完整介绍（信息区增加颜色背景） -->
<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <div class="modal-container">
        <img class="modal-content" id="modalImage" alt="放大预览">
        <div class="modal-info" id="modalInfo">
            <!-- 动态填入标题、年份、标签、介绍 -->
        </div>
    </div>
</div>

<script>
    // ===================== 作品数据（支持多标签，增加描述字段）=====================
    // 排序规则：基于 id 序号（正序：id 从小到大，倒序：id 从大到小）
    const paintingsData = [
        {
            id: 1,
            title: "庄",
            year: "2025.4.21",
            labels: ["二创", "水墨风"],
            description: "以传统水墨笔触描绘的幻想角色，融合了现代二次元风格。",
            imageUrl: "images/0001.jpg",
            alt: "zmd"
        },
        {
            id: 2,
            title: "4667",
            year: "2025.4.21",
            labels: ["原创", "赛博朋克"],
            description: "未来都市中的机械少女，光影对比强烈。",
            imageUrl: "images/0002.png",
            alt: "899"
        },
        {
            id: 3,
            title: "1999",
            year: "2025.4.21",
            labels: ["二创", "复古"],
            description: "世纪末的回忆，暖色调营造怀旧氛围。",
            imageUrl: "images/0003.jpg",
            alt: "zmhjd"
        },
        {
            id: 4,
            title: "结成里",
            year: "2025.4.18",
            labels: ["二创", "校园", "清新"],
            description: "春日午后的少女，轻快的笔触记录日常。",
            imageUrl: "images/0004.jpg",
            alt: "summer night"
        },
        {
            id: 5,
            title: "星轨",
            year: "2025.4.10",
            labels: ["原创", "星空", "幻想"],
            description: "仰望星空的魔法师，长曝光般的梦幻效果。",
            imageUrl: "images/0005.jpg",
            alt: "star trail"
        }
    ];

    // 全局状态
    let currentPaintings = [...paintingsData];
    let activeFilter = "全部";       // 当前选中的标签筛选
    let currentSort = "desc";        // 排序方向: 'desc' 倒序(id从大到小) / 'asc' 正序(id从小到大)

    const galleryContainer = document.getElementById('galleryContainer');
    const tagFilterBar = document.getElementById('tagFilterBar');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const modalInfo = document.getElementById('modalInfo');
    const closeModalSpan = document.querySelector('.close-modal');

    // ----- 排序核心：按序号 (id) 排序 -----
    function sortPaintingsById(list, order) {
        const sorted = [...list];
        sorted.sort((a, b) => {
            if (order === 'desc') return b.id - a.id;   // 倒序: id 从大到小
            else return a.id - b.id;                   // 正序: id 从小到大
        });
        return sorted;
    }

    // ----- 提取所有不重复的标签 (从 labels 数组中) -----
    function getAllUniqueLabels() {
        const labelSet = new Set();
        labelSet.add("全部");
        paintingsData.forEach(painting => {
            if (painting.labels && Array.isArray(painting.labels)) {
                painting.labels.forEach(label => labelSet.add(label));
            }
        });
        return Array.from(labelSet);
    }

    // 筛选作品 (基于标签，作品只要包含该标签就算)
    function filterPaintingsByLabel(label) {
        if (label === "全部") {
            return [...paintingsData];
        } else {
            return paintingsData.filter(painting => 
                painting.labels && painting.labels.includes(label)
            );
        }
    }

    // 刷新数据：先筛选，再按序号排序
    function refreshData() {
        let filtered = filterPaintingsByLabel(activeFilter);
        currentPaintings = sortPaintingsById(filtered, currentSort);
        renderGallery(currentPaintings);
    }

    // ----- 渲染筛选按钮 (多标签) -----
    function renderTagButtons() {
        const allLabels = getAllUniqueLabels();
        tagFilterBar.innerHTML = '';
        allLabels.forEach(label => {
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.classList.add('tag-btn');
            if (label === activeFilter) {
                btn.classList.add('active');
            }
            btn.addEventListener('click', () => {
                activeFilter = label;
                refreshData();
                // 更新按钮高亮
                document.querySelectorAll('.tag-btn').forEach(btnEl => {
                    if (btnEl.textContent === activeFilter) btnEl.classList.add('active');
                    else btnEl.classList.remove('active');
                });
            });
            tagFilterBar.appendChild(btn);
        });
    }

    // 渲染瀑布流卡片 (支持多标签展示)
    function renderGallery(paintingsArray) {
        if (!galleryContainer) return;
        galleryContainer.innerHTML = '';

        if (!paintingsArray.length) {
            const noResultDiv = document.createElement('div');
            noResultDiv.className = 'no-results';
            noResultDiv.textContent = '🖼️ 暂无作品，试试其他标签 🖼️';
            galleryContainer.appendChild(noResultDiv);
            return;
        }

        const fragment = document.createDocumentFragment();
        
        paintingsArray.forEach(painting => {
            const card = document.createElement('div');
            card.className = 'art-card';

            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';

            const img = document.createElement('img');
            img.src = painting.imageUrl;
            img.alt = painting.alt || painting.title;
            img.className = 'art-image';
            img.loading = 'lazy';
            img.decoding = 'async';

            // 点击图片打开模态框（展示完整介绍）
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                openModal(painting);
            });

            imgWrapper.appendChild(img);

            const infoDiv = document.createElement('div');
            infoDiv.className = 'art-info';

            // 时间
            const yearEl = document.createElement('div');
            yearEl.className = 'art-year';
            yearEl.textContent = painting.year;

            // 多标签区域
            const tagContainer = document.createElement('div');
            tagContainer.className = 'multi-tag-list';
            if (painting.labels && painting.labels.length) {
                painting.labels.forEach(label => {
                    const tagSpan = document.createElement('span');
                    tagSpan.className = 'art-label';
                    tagSpan.textContent = label;
                    // 点击小标签快速筛选
                    tagSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const targetBtn = Array.from(document.querySelectorAll('.tag-btn')).find(btn => btn.textContent === label);
                        if (targetBtn) {
                            targetBtn.click();
                        } else {
                            activeFilter = label;
                            refreshData();
                            document.querySelectorAll('.tag-btn').forEach(btn => {
                                if (btn.textContent === activeFilter) btn.classList.add('active');
                                else btn.classList.remove('active');
                            });
                        }
                    });
                    tagContainer.appendChild(tagSpan);
                });
            }

            const titleEl = document.createElement('div');
            titleEl.className = 'art-title';
            titleEl.textContent = painting.title;

            infoDiv.appendChild(yearEl);
            infoDiv.appendChild(tagContainer);
            infoDiv.appendChild(titleEl);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            fragment.appendChild(card);
        });
        
        galleryContainer.appendChild(fragment);
    }

    // ----- 模态框：展示高清图 + 完整介绍文字 (信息区已增加颜色背景层)-----
    function openModal(painting) {
        modal.style.display = 'flex';
        modalImg.src = painting.imageUrl;
        modalImg.alt = painting.title;

        // 构建详细内容，模态框信息区通过伪元素已经有了暖色背景
        modalInfo.innerHTML = `
            <div class="modal-title">${escapeHtml(painting.title)}</div>
            <div class="modal-year">📅 ${escapeHtml(painting.year)}</div>
            <div class="modal-tags">
                ${painting.labels.map(tag => `<span class="modal-tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
            <div class="modal-desc">📖 ${escapeHtml(painting.description || '暂无详细描述，但每一幅都是用心之作。')}</div>
        `;
    }

    // 简单的防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 排序按钮交互 + 基于序号更新排序并刷新
    function initSortButtons() {
        const descBtn = document.querySelector('.sort-btn[data-sort="desc"]');
        const ascBtn = document.querySelector('.sort-btn[data-sort="asc"]');
        
        // 设置初始激活样式（默认倒序）
        if (currentSort === 'desc') descBtn.classList.add('active');
        else ascBtn.classList.add('active');
        
        descBtn.addEventListener('click', () => {
            if (currentSort === 'desc') return;
            currentSort = 'desc';
            descBtn.classList.add('active');
            ascBtn.classList.remove('active');
            refreshData();
        });
        
        ascBtn.addEventListener('click', () => {
            if (currentSort === 'asc') return;
            currentSort = 'asc';
            ascBtn.classList.add('active');
            descBtn.classList.remove('active');
            refreshData();
        });
    }

    // 模态框关闭事件
    function initModal() {
        closeModalSpan.onclick = () => modal.style.display = "none";
        modal.onclick = (e) => {
            if (e.target === modal) modal.style.display = "none";
        };
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.style.display === "flex") modal.style.display = "none";
        });
    }

    // 初始化
    function init() {
        activeFilter = "全部";
        currentSort = "desc";     // 默认倒序（按 id 从大到小，即新作品序号大在前）
        renderTagButtons();
        // 初次渲染数据（筛选+按id排序）
        let filtered = filterPaintingsByLabel(activeFilter);
        currentPaintings = sortPaintingsById(filtered, currentSort);
        renderGallery(currentPaintings);
        initSortButtons();
        initModal();
    }

    init();
</script>

<!-- 功能实现说明：
     1. 排序规则：按照作品的 id 序号进行正序(从小到大) / 倒序(从大到小)排列，默认倒序（最新添加的作品序号大优先显示）。
     2. 排序按钮背景复用标签按钮的 PNG 图片（btn-bg.png / btn-bg-active.png），视觉风格统一。
     3. 点击图片后模态框内信息区增加了暖褐色半透明颜色背景（通过 .modal-info::before 实现），同时保留 card-bg.png 纹理，文字清晰且具有质感。
     4. 多标签支持、瀑布流错落、头部简化、图片懒加载等功能均保留。
     所需素材：images/btn-bg.png / btn-bg-active.png / card-bg.png 以及作品图片 0001.jpg 等。
-->
</body>
</html>
```
