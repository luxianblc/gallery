<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>lu作品集 · 瀑布流</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: transparent;
            color: #1e1e1e;
            line-height: 1.5;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 500;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #2c3e4e, #4a627a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }

        .sub {
            color: #4a5b6b;
            font-size: 1rem;
            border-top: 1px solid #ddd6cf;
            display: inline-block;
            padding-top: 0.6rem;
        }

        /* 标签筛选栏 - PNG背景 */
        .tag-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
            padding-bottom: 0.5rem;
        }

        .tag-btn {
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 0px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e4e;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            font-family: inherit;
            text-shadow: 0 1px 1px rgba(255,255,255,0.6);
        }

        .tag-btn:hover {
            transform: translateY(-2px);
            filter: brightness(0.96);
        }

        .tag-btn.active {
            background-image: url('images/btn-bg-active.png');
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.4);
        }

        /* ========= 瀑布流容器 (类似小红书错落排列) ========= */
        .gallery {
            column-count: 4;           /* 默认4列 */
            column-gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* 卡片 - 避免内部元素断裂，错落高度自动适应 */
        .art-card {
            break-inside: avoid;       /* 防止卡片被截断跨列 */
            margin-bottom: 1.5rem;
            background: rgba(255, 255, 245, 0.25);
            backdrop-filter: blur(3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: inline-block;     /* 配合瀑布流 */
            width: 100%;
            border-radius: 0px;
            overflow: hidden;
        }

        .art-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 32px -8px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 245, 0.95);
        }

        .image-wrapper {
            position: relative;
            background: rgba(0,0,0,0.05);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .art-image {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s ease;
            object-fit: cover;
        }

        .art-card:hover .art-image {
            transform: scale(1.02);
        }

        /* 作品信息区 - PNG背景 */
        .art-info {
            padding: 1rem 1rem 1.2rem;
            background-image: url('images/card-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            z-index: 1;
            border-top: 1px solid rgba(200,180,150,0.4);
        }

        .art-info::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 250, 240, 0.7);
            z-index: -1;
        }

        /* 只保留三个信息：时间、标签、介绍 */
        .art-year {
            font-size: 0.8rem;
            color: #5e6e7e;
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
        }

        .art-label {
            display: inline-block;
            background-image: url('images/btn-bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c3e4e;
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
            margin-bottom: 0.5rem;
            border-radius: 0px;
        }

        .art-title {
            font-size: 1rem;
            font-weight: 700;
            color: #1f2e3a;
            line-height: 1.4;
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
            color: #8d9aa5;
            background: rgba(245, 242, 237, 0.8);
            border-radius: 0px;
        }

        .footer {
            text-align: center;
            margin-top: 1rem;
            padding: 1.5rem 0 0.5rem;
            border-top: 1px solid #ddd6cf;
            color: #7c8b9a;
            font-size: 0.85rem;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-content {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 0px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,240,0.5);
        }

        .close-modal {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px;
        }

        .close-modal:hover {
            color: #ccc;
            background: rgba(0,0,0,0.9);
        }

        /* 响应式：屏幕变窄时减少列数 */
        @media (max-width: 1200px) {
            .gallery {
                column-count: 3;
            }
        }
        @media (max-width: 800px) {
            .gallery {
                column-count: 2;
            }
        }
        @media (max-width: 500px) {
            .gallery {
                column-count: 1;
            }
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 2rem;
            }
            .tag-btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>lu作品集</h1>
        <div class="sub">时间 · 标签 · 介绍 | 瀑布流错落排版</div>
    </div>

    <div class="tag-filter" id="tagFilterBar"></div>
    
    <!-- 瀑布流容器 -->
    <div class="gallery" id="galleryContainer">
        <div class="loading-placeholder" style="text-align:center; padding:2rem; width:100%;">✨ 加载作品中... ✨</div>
    </div>
    
    <div class="footer">
        <p>© 个人作品集 · 图片已优化懒加载 | 瀑布流自然错落</p>
    </div>
</div>

<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage" alt="放大预览">
</div>

<script>
    // ===================== 作品数据（可随意增删）=====================
    // 提示：为了让图片加载更快，建议先用 TinyPNG / Squoosh 压缩图片，宽度控制在1200px以内。
    const paintingsData = [
        {
            id: 1,
            title: "庄",
            year: "2025.4.21",
            label: "二创",
            imageUrl: "images/0001.jpg",
            alt: "zmd"
        },
        {
            id: 2,
            title: "4667",
            year: "2025.4.21",
            label: "原创",
            imageUrl: "images/0002.png",
            alt: "899"
        },
        {
            id: 3,
            title: "1999",
            year: "2025.4.21",
            label: "二创",
            imageUrl: "images/0003.jpg",
            alt: "zmhjd"
        },
        {
            id: 4,
            title: "结成里",
            year: "2025.4.18",
            label: "二创"，
            imageUrl: "images/0004.jpg",
            alt: "summer night"
        }
        // 你可以继续添加更多，瀑布流会自动适应不同高度的图片
    ];

    // 全局变量
    let currentPaintings = [...paintingsData];
    let activeFilter = "全部";

    const galleryContainer = document.getElementById('galleryContainer');
    const tagFilterBar = document.getElementById('tagFilterBar');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const closeModalSpan = document.querySelector('.close-modal');

    // 提取所有不重复的标签（用于筛选栏）
    function getAllLabels() {
        const labelSet = new Set();
        labelSet.add("全部");
        paintingsData.forEach(painting => {
            if (painting.label) {
                labelSet.add(painting.label);
            }
        });
        return Array.from(labelSet);
    }

    // 根据标签筛选作品
    function filterPaintingsByLabel(label) {
        if (label === "全部") {
            return [...paintingsData];
        } else {
            return paintingsData.filter(p => p.label === label);
        }
    }

    // 渲染筛选按钮
    function renderTagButtons() {
        const allLabels = getAllLabels();
        tagFilterBar.innerHTML = '';
        allLabels.forEach(label => {
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.classList.add('tag-btn');
            if (label === activeFilter) {
                btn.classList.add('active');
            }
            btn.addEventListener('click', () => {
                activeFilter = label;
                currentPaintings = filterPaintingsByLabel(activeFilter);
                renderGallery(currentPaintings);
                document.querySelectorAll('.tag-btn').forEach(btnEl => {
                    if (btnEl.textContent === activeFilter) {
                        btnEl.classList.add('active');
                    } else {
                        btnEl.classList.remove('active');
                    }
                });
            });
            tagFilterBar.appendChild(btn);
        });
    }

    // 渲染瀑布流作品网格 (错落排列)
    function renderGallery(paintingsArray) {
        if (!galleryContainer) return;
        galleryContainer.innerHTML = '';

        if (!paintingsArray.length) {
            const noResultDiv = document.createElement('div');
            noResultDiv.className = 'no-results';
            noResultDiv.textContent = '🖼️ 暂无作品，试试其他标签 🖼️';
            galleryContainer.appendChild(noResultDiv);
            return;
        }

        // 使用文档片段提升性能
        const fragment = document.createDocumentFragment();
        
        paintingsArray.forEach(painting => {
            const card = document.createElement('div');
            card.className = 'art-card';

            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'image-wrapper';

            const img = document.createElement('img');
            img.src = painting.imageUrl;
            img.alt = painting.alt || painting.title;
            img.className = 'art-image';
            // 懒加载 + 解码优化
            img.loading = 'lazy';
            img.decoding = 'async';

            img.addEventListener('click', (e) => {
                e.stopPropagation();
                modal.style.display = 'flex';
                modalImg.src = painting.imageUrl;
                modalImg.alt = painting.title;
            });

            imgWrapper.appendChild(img);

            const infoDiv = document.createElement('div');
            infoDiv.className = 'art-info';

            // 时间
            const yearEl = document.createElement('div');
            yearEl.className = 'art-year';
            yearEl.textContent = painting.year;

            // 标签名称（使用与按钮相同的PNG背景）
            const labelEl = document.createElement('div');
            labelEl.className = 'art-label';
            labelEl.textContent = painting.label;

            // 介绍
            const titleEl = document.createElement('div');
            titleEl.className = 'art-title';
            titleEl.textContent = painting.title;

            infoDiv.appendChild(yearEl);
            infoDiv.appendChild(labelEl);
            infoDiv.appendChild(titleEl);
            card.appendChild(imgWrapper);
            card.appendChild(infoDiv);
            fragment.appendChild(card);
        });
        
        galleryContainer.appendChild(fragment);
    }

    // 模态框关闭
    function initModal() {
        closeModalSpan.onclick = () => modal.style.display = "none";
        modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape" && modal.style.display === "flex") modal.style.display = "none";
        });
    }

    function init() {
        activeFilter = "全部";
        currentPaintings = filterPaintingsByLabel(activeFilter);
        renderTagButtons();
        renderGallery(currentPaintings);
        initModal();
    }

    init();
</script>

<!-- 使用说明（优化加载速度 + 瀑布流）：
     
     【图片加载更快的方法】
     1. 强烈推荐在上传前压缩图片：
        - 使用 TinyPNG (tinypng.com) 或 Squoosh (squoosh.app)
        - 把图片宽度统一调整为 1000px ~ 1500px 之间（不需要原图几千像素）
        - 保存为 JPG 格式（质量 70-85%）或 WebP 格式体积更小
     2. 本代码已添加 loading="lazy" (懒加载) + decoding="async" (异步解码)
     3. 图片放到 images/ 文件夹后，文件名保持与代码中一致

     【瀑布流错落排列】
     - 采用 CSS 多列布局 (column-count)，图片根据自身高度自然排列，类似小红书/Pinterest
     - 不同高度的图片会错落有致，不再强制等高
     - 响应式：屏幕越大列数越多（4列→3列→2列→1列）

     需要准备的图片素材：
     - images/btn-bg.png          (普通按钮背景)
     - images/btn-bg-active.png   (激活按钮背景)
     - images/card-bg.png         (卡片信息区背景)
     - images/0001.jpg ...        (你的绘画作品)

     如果觉得初始加载还是慢，可以给 body 设置背景图，同时图片压缩是关键。
-->
</body>
</html>
